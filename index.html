<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#111">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="manifest" href="manifest.json">
<title>Retro Tracker Players</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/jszip@3/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<div id="player">
  <div id="info"></div>

  <div id="filter-row">
    <span id="share-wrap">
      <button id="share-btn" type="button" title="Share / copy link">S</button>
      <div id="share-panel" hidden>
        <button class="share-opt" data-action="copy">Copy deep link</button>
        <button class="share-opt" data-action="twitter">Share on X / Twitter</button>
        <button class="share-opt" data-action="facebook">Share on Facebook</button>
      </div>
    </span>
    <span id="filter-wrap">
      <input type="text" id="filter" placeholder="Filter tracks…">
      <button id="filter-clear" type="button" aria-label="Clear">&times;</button>
    </span>
    <select id="search-mode">
      <option value="local">local</option>
      <option value="modland">modland</option>
    </select>
    <span id="filter-count"></span>
  </div>

  <div id="sel-row">
    <span id="sel-bulk" title="Toggle all, none, or restore previous selection">
      <input type="checkbox" id="sel-bulk-cb" aria-label="Toggle all, none, or restore selection">
    </span>
    <button id="btn-copy" title="Copy selected filenames to clipboard">C</button>
    <span id="sel-count"></span>
    <button id="btn-zip" title="Download selected tracks as ZIP">Z</button>
    <button id="ml-add-all" class="ml-btn ml-add" style="display:none" title="Add all search results">+</button>
    <button id="ml-del-all" class="ml-btn" style="display:none" title="Delete all modland tracks">-</button>
    <button id="ml-random" class="ml-btn" style="display:none" title="Browse random tracks">R</button>
    <div id="refine-inline">
      <div id="refine-folder-wrap" class="refine-panel-wrap" title="Filter by folder">
        <button id="refine-folder-btn" type="button">F</button>
        <div id="refine-folder-panel" hidden></div>
      </div>
      <div id="refine-artist-wrap" class="refine-panel-wrap" title="Filter by artist">
        <button id="refine-artist-btn" type="button">A</button>
        <div id="refine-artist-panel" hidden></div>
      </div>
      <div id="refine-range-wrap" class="refine-panel-wrap" title="Result page">
        <button id="refine-range-btn" type="button">1..N</button>
        <div id="refine-range-panel" hidden></div>
      </div>
      <div id="refine-format-wrap" title="Filter by format">
        <button id="refine-format-btn" type="button">T</button>
        <div id="refine-format-panel" hidden></div>
      </div>
      <button id="help-btn" type="button" title="Help / About">?</button>
    </div>
    <span id="track-pos"></span>
  </div>

  <ul id="playlist"></ul>

  <div id="transport">
    <button id="btn-play" title="Play / Pause">&#9654;</button>
    <span class="time" id="time">0:00</span>
    <input type="range" id="seek" min="0" max="300" value="0" step="1">
    <span class="time" id="duration">—</span>
  </div>
  <pre id="debug-log" hidden></pre>

  <div id="help-overlay" hidden>
    <button id="help-close" type="button" aria-label="Close help">&times;</button>
    <div id="help-content"></div>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
